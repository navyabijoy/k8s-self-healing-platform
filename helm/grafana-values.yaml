adminUser: admin
adminPassword: "grafana-admin-pass"

persistence:
  enabled: true
  size: 1Gi
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
          prometheusType: Prometheus
          prometheusVersion: "2.45.0"

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'custom-dashboards'
        orgId: 1
        folder: 'Self-Healing EKS'
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards/custom

dashboardsConfigMaps:
  custom: "grafana-dashboards"

defaultDashboardsEnabled: true
defaultDashboardsTimezone: "browser"

service:
  type: NodePort
  nodePort: 32000

grafana.ini:
  server:
    domain: localhost
    root_url: "%(protocol)s://%(domain)s/"
  auth.anonymous:
    enabled: false
  analytics:
    reporting_enabled: false
    check_for_updates: false
