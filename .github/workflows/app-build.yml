name: "Build and Push App Image"

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/self-healing-eks-app

jobs:
  build-and-push:
    name: "Build, Scan & Push"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            BUILD_TIME=${{ steps.meta.outputs.BUILD_TIME }}
            GIT_COMMIT=${{ steps.meta.outputs.GIT_COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout CVE Scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.IMAGE_TAG }}
          only-severities: critical
          exit-code: true
        continue-on-error: true

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            BUILD_TIME=${{ steps.meta.outputs.BUILD_TIME }}
            GIT_COMMIT=${{ steps.meta.outputs.GIT_COMMIT }}
          cache-from: type=gha

      - name: Print image info
        run: |
          echo "Image pushed successfully!"
          echo "   Tag:    ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.IMAGE_TAG }}"
          echo "   Commit: ${{ steps.meta.outputs.GIT_COMMIT }}"
          echo "   Built:  ${{ steps.meta.outputs.BUILD_TIME }}"
          echo ""
          echo "To deploy:"
          echo "  kubectl set image deployment/demo-app demo-app=${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.IMAGE_TAG }} -n app"
