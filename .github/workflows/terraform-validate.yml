name: "Terraform Validate"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

jobs:
  terraform-validate:
    name: "Validate Terraform"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Terraform Validation Results

            | Check | Result |
            |-------|--------|
            | Format | ${{ steps.fmt.outcome == 'success' && 'Passed' || 'Failed — run terraform fmt' }} |
            | Init   | ${{ steps.init.outcome == 'success' && 'Passed' || 'Failed' }} |
            | Validate | ${{ steps.validate.outcome == 'success' && 'Passed' || 'Failed' }} |

            <details><summary>Validate Output</summary>

            \`\`\`
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }} on ${{ github.event.pull_request.head.ref }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Check Results
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1
